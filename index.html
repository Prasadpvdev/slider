<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Seat Climate Dashboard</title>
<style>html,body,#root{height:100%;margin:0;background:#060d14;}</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;


function FanDashboard() {
  const [temp, setTemp] = useState(24.6);
  const [hum, setHum] = useState(54);
  const [highT, setHighT] = useState(26.0);  // Fan ON temperature
  const [lowT, setLowT] = useState(22.0);     // Fan OFF temperature
  const [mode, setMode] = useState("A"); // A auto, F off, N on
  const [fanOn, setFanOn] = useState(false);
  const [connected, setConnected] = useState(false);   // real BLE connection
  const [covered, setCovered] = useState(false);
  const [tapActive, setTapActive] = useState(false);
  const [seatState, setSeatState] = useState(0); // 0 OFF,1 HIGH,2 MED,3 LOW
  const [history, setHistory] = useState(() =>
    Array.from({ length: 40 }, () => 24.5)
  );
  const fanRef = useRef(false);
  const wasCovered = useRef(false);

  // ---- BLE (Web Bluetooth) ----
  const SERVICE_UUID = "0000ffe0-0000-1000-8000-00805f9b34fb";
  const NOTIFY_UUID  = "0000ffe1-0000-1000-8000-00805f9b34fb";
  const WRITE_UUID   = "0000ffe2-0000-1000-8000-00805f9b34fb";
  const writeCharRef = useRef(null);
  const deviceRef = useRef(null);

  const handleLine = (line) => {
    // "T,H,fan,mode,seat"
    const parts = line.trim().split(",");
    if (parts.length < 5) return;
    const t = parseFloat(parts[0]);
    const h = parseFloat(parts[1]);
    const fan = parts[2] === "1";
    const md = parts[3];
    const seat = parseInt(parts[4], 10);
    if (!isNaN(t)) { setTemp(t); setHistory((hh) => [...hh.slice(1), t]); }
    if (!isNaN(h)) setHum(h);
    setFanOn(fan); fanRef.current = fan;
    if (md) setMode(md);
    if (!isNaN(seat)) setSeatState(seat);
  };

  const connectBLE = async () => {
    if (!navigator.bluetooth) {
      alert("Web Bluetooth not available. Use Chrome on Android/desktop over HTTPS.");
      return;
    }
    try {
      const device = await navigator.bluetooth.requestDevice({
        filters: [{ services: [SERVICE_UUID] }],
        optionalServices: [SERVICE_UUID],
      });
      deviceRef.current = device;
      device.addEventListener("gattserverdisconnected", () => setConnected(false));
      const server = await device.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      const notifyChar = await service.getCharacteristic(NOTIFY_UUID);
      writeCharRef.current = await service.getCharacteristic(WRITE_UUID);
      await notifyChar.startNotifications();
      notifyChar.addEventListener("characteristicvaluechanged", (e) => {
        const dec = new TextDecoder();
        handleLine(dec.value ? dec.value : dec.decode(e.target.value));
      });
      setConnected(true);
    } catch (err) {
      console.error(err);
    }
  };

  const sendCmd = async (ch) => {
    if (writeCharRef.current) {
      try { await writeCharRef.current.writeValue(new TextEncoder().encode(ch)); }
      catch (e) { console.error(e); }
    }
  };

  // Fan ON slider — must stay at least 1° above Fan OFF
  const changeHigh = (v) => {
    const val = Math.max(lowT + 1, Math.min(32, v));
    setHighT(val);
    if (connected) sendCmd("H" + val);   // e.g. "H26.5"
  };
  // Fan OFF slider — must stay at least 1° below Fan ON
  const changeLow = (v) => {
    const val = Math.min(highT - 1, Math.max(18, v));
    setLowT(val);
    if (connected) sendCmd("L" + val);   // e.g. "L22.0"
  };

  const SEAT = [
    { label: "OFF", sub: "no ventilation", color: "#8aa3b8", level: 0 },
    { label: "HIGH", sub: "occupant detected", color: "#ff5e5b", level: 3 },
    { label: "MEDIUM", sub: "steady airflow", color: "#ffd166", level: 2 },
    { label: "LOW", sub: "gentle airflow", color: "#4cc9f0", level: 1 },
  ];
  const seat = SEAT[seatState];

  // Each LDR cover advances the seat ventilation one step + fires a 1s tap
  // — but ONLY when the climate fans are ON (system active)
  const triggerCover = () => {
    if (connected) {            // real LDR on the ESP32 drives the seat; just flash feedback
      setCovered(true);
      setTimeout(() => setCovered(false), 300);
      return;
    }
    if (!fanRef.current) {            // fans off -> touch is ignored
      setCovered(true);
      setTimeout(() => { setCovered(false); }, 400);
      return;
    }
    setCovered(true);
    if (!wasCovered.current && !tapActive) {
      wasCovered.current = true;
      setTapActive(true);
      setSeatState((s) => (s + 1) % 4);   // OFF->HIGH->MED->LOW->OFF
      setTimeout(() => setTapActive(false), 1000);
    }
    setTimeout(() => { setCovered(false); wasCovered.current = false; }, 600);
  };

  // Simulated live data — runs ONLY when not connected to real hardware.
  useEffect(() => {
    if (connected) return;            // real BLE data takes over
    const id = setInterval(() => {
      setTemp((prev) => {
        let drift = (Math.random() - 0.5) * 0.7;       // neutral drift, wanders up & down
        let next = Math.max(18, Math.min(32, prev + drift));
        let on = fanRef.current;
        if (mode === "A") {
          if (!on && next >= highT) on = true;
          if (on && next <= lowT) on = false;
        } else if (mode === "F") on = false;
        else if (mode === "N") on = true;
        fanRef.current = on;
        setFanOn(on);
        if (!on) setSeatState(0);   // fans off -> seat ventilation also off
        setHistory((h) => [...h.slice(1), next]);
        return next;
      });
      setHum((p) => Math.max(35, Math.min(75, p + (Math.random() - 0.5) * 2)));
    }, 1200);
    return () => clearInterval(id);
  }, [mode, connected]);

  // Apply fan mode — send to hardware if connected, else update sim immediately
  const applyMode = (m) => {
    setMode(m);
    if (connected) { sendCmd(m); return; }   // hardware decides & reports back
    let on = fanRef.current;
    if (m === "F") on = false;
    else if (m === "N") on = true;
    else {
      if (!on && temp >= highT) on = true;
      if (on && temp <= lowT) on = false;
    }
    fanRef.current = on;
    setFanOn(on);
  };

  // Gauge geometry
  const TMIN = 16, TMAX = 34;
  const pct = Math.max(0, Math.min(1, (temp - TMIN) / (TMAX - TMIN)));
  const ang = -120 + pct * 240; // -120..+120 deg
  const R = 130;
  const cx = 160, cy = 160;
  const needleX = cx + R * 0.78 * Math.cos((ang - 90) * Math.PI / 180);
  const needleY = cy + R * 0.78 * Math.sin((ang - 90) * Math.PI / 180);

  // Arc path helper
  const polar = (a, r) => [
    cx + r * Math.cos((a - 90) * Math.PI / 180),
    cy + r * Math.sin((a - 90) * Math.PI / 180),
  ];
  const arc = (a0, a1, r) => {
    const [x0, y0] = polar(a0, r);
    const [x1, y1] = polar(a1, r);
    const large = a1 - a0 > 180 ? 1 : 0;
    return `M ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1}`;
  };

  const tempColor = temp >= highT ? "#ff5e5b" : temp <= lowT ? "#4cc9f0" : "#ffd166";

  const maxH = Math.max(...history), minH = Math.min(...history);
  const span = Math.max(2, maxH - minH);

  return (
    <div style={{
      height: "100vh", overflow: "hidden",
      background: "radial-gradient(1100px 700px at 50% -15%, #1a3a57 0%, #0c1b2a 50%, #050b12 100%)",
      fontFamily: "'Inter', system-ui, sans-serif", color: "#e9f1f7",
      padding: "12px 16px", boxSizing: "border-box",
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent;
            font-family:'Inter', system-ui, sans-serif; }
        .ttl { font-family:'Inter', sans-serif; letter-spacing:-0.02em; }
        .mono { font-family:'Inter', sans-serif; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; }
        .card {
          background: linear-gradient(160deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
          border:1px solid rgba(255,255,255,0.10);
          border-radius:22px; backdrop-filter: blur(10px);
          box-shadow: 0 8px 30px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .btn { cursor:pointer; border:none; border-radius:16px; padding:14px 10px; font-weight:600;
               font-family:'Inter', sans-serif; font-size:14px; letter-spacing:0.02em;
               transition: all .2s cubic-bezier(.2,.8,.2,1); }
        .btn:active { transform: scale(0.96); }
        .pulse { animation: pulse 1.6s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .spin { animation: spin 1.1s linear infinite; transform-origin:center; }
        @keyframes spin { to { transform: rotate(360deg);} }
        .glow { animation: glowpulse 3s ease-in-out infinite; }
        @keyframes glowpulse { 0%,100%{opacity:0.5} 50%{opacity:0.9} }
        /* airflow streaming outward */
        .flow { stroke-dasharray: 8 10; animation: flow 1s linear infinite; }
        @keyframes flow { to { stroke-dashoffset: -18; } }
        .flow2 { stroke-dasharray: 8 10; animation: flow 0.7s linear infinite; }
        .flow3 { stroke-dasharray: 8 10; animation: flow 0.5s linear infinite; }
      `}</style>

      <div style={{ maxWidth: 460, margin: "0 auto" }}>
        {/* Header */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <div>
            <div className="ttl" style={{ fontSize: 23, fontWeight: 800, letterSpacing: -0.5,
              background: "linear-gradient(90deg,#ffffff,#9fd0ee)", WebkitBackgroundClip: "text",
              WebkitTextFillColor: "transparent", backgroundClip: "text" }}>Climate Control</div>
            <div className="mono" style={{ fontSize: 11, color: "#7fa8c9", marginTop: 2 }}>{connected ? "ESP32 · BLE · LIVE" : "ESP32 · tap to connect"}</div>
          </div>
          <button onClick={connectBLE} className="card btn"
            style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 14px", borderRadius: 999,
                     background: connected ? "rgba(61,220,132,0.15)" : "rgba(255,255,255,0.06)",
                     color: connected ? "#3ddc84" : "#cfe0ee", border: "1px solid rgba(255,255,255,0.12)" }}>
            <span style={{ width: 9, height: 9, borderRadius: 999, background: connected ? "#3ddc84" : "#ff5e5b" }} className={connected ? "pulse" : ""} />
            <span className="mono" style={{ fontSize: 11 }}>{connected ? "CONNECTED" : "CONNECT"}</span>
          </button>
        </div>

        {/* Top row: gauge + seat side by side */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, alignItems: "start" }}>

        {/* ===== gauge ===== */}
        <div>
        {/* Gauge */}
        <div className="card" style={{ padding: "6px 0 0", marginBottom: 10, position: "relative" }}>
          <svg viewBox="20 30 280 230" style={{ width: "100%", maxHeight: "26vh", display: "block", margin: "0 auto" }}>
            <defs>
              <filter id="needleGlow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="3.5" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <linearGradient id="coolArc" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0" stopColor="#3a8fd4"/><stop offset="1" stopColor="#4cc9f0"/>
              </linearGradient>
              <linearGradient id="hotArc" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0" stopColor="#ff8a3d"/><stop offset="1" stopColor="#ff5e5b"/>
              </linearGradient>
            </defs>
            <path d={arc(-120, 120, R)} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="18" strokeLinecap="round" />
            <path d={arc(-120, -120 + ((lowT - TMIN) / (TMAX - TMIN)) * 240, R)} fill="none" stroke="url(#coolArc)" strokeWidth="18" strokeLinecap="round" opacity="0.85" />
            <path d={arc(-120 + ((highT - TMIN) / (TMAX - TMIN)) * 240, 120, R)} fill="none" stroke="url(#hotArc)" strokeWidth="18" strokeLinecap="round" opacity="0.85" />
            {/* needle with glow */}
            <line x1={cx} y1={cy} x2={needleX} y2={needleY} stroke={tempColor} strokeWidth="5" strokeLinecap="round" filter="url(#needleGlow)" />
            <circle cx={cx} cy={cy} r="13" fill="#0a1722" stroke={tempColor} strokeWidth="3.5" filter="url(#needleGlow)" />
            <circle cx={cx} cy={cy} r="4" fill={tempColor} />
            {/* value */}
            <text x={cx} y={cy + 58} textAnchor="middle" className="ttl" fill="#fff" fontSize="48" fontWeight="800" filter="url(#needleGlow)">{temp.toFixed(1)}°</text>
            <text x={cx} y={cy + 80} textAnchor="middle" className="mono" fill="#7fa8c9" fontSize="13">CELSIUS</text>
            <text x={polar(-120, R)[0] - 4} y={polar(-120, R)[1] + 22} textAnchor="middle" className="mono" fill="#5f7a93" fontSize="11">{TMIN}</text>
            <text x={polar(120, R)[0] + 4} y={polar(120, R)[1] + 22} textAnchor="middle" className="mono" fill="#5f7a93" fontSize="11">{TMAX}</text>
          </svg>
        </div>
        </div>{/* end gauge column */}

        {/* ===== seat column ===== */}
        <div>
        {/* Car seat ventilation */}
        <div className="card" style={{ padding: 12, marginBottom: 10 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div className="mono" style={{ fontSize: 11, color: "#7fa8c9" }}>SEAT VENTILATION</div>
            <div className="mono" style={{ fontSize: 10, color: tapActive ? "#ffd166" : "#5f7a93" }}>
              {tapActive ? "● sending tap…" : "ready"}
            </div>
          </div>

          <div style={{ display: "flex", alignItems: "center", gap: 18 }}>
            {/* Side-view ventilated seat with airflow lines */}
            <div style={{ position: "relative", flex: "0 0 auto" }}>
              <svg width="125" height="112" viewBox="20 14 90 86"
                style={{ filter: seatState!==0 ? `drop-shadow(0 0 8px ${seat.color}88)` : "none", transition:"filter .3s ease" }}>
                {/* OEM-style ventilated seat — tall backrest, short cushion, wavy airflow */}
                <path d="M 40 92 L 30 26 Q 29 18 37 20 L 47 25 Q 44 60 52 92 Z"
                  fill="none" stroke={seat.color} strokeWidth="5" strokeLinejoin="round" strokeLinecap="round"/>
                <path d="M 52 94 L 53 76 L 92 79 Q 100 79 100 87 Q 100 95 92 95 L 58 96 Q 52 96 52 94 Z"
                  fill="none" stroke={seat.color} strokeWidth="5" strokeLinejoin="round" strokeLinecap="round"/>
                {[63, 74, 85].map((x, i) => {
                  const on = seat.level > i;
                  const cls = seat.level===3?"flow3":seat.level===2?"flow2":"flow";
                  const d = `M ${x} 76 C ${x-4} 70, ${x+4} 64, ${x} 58 C ${x-4} 53, ${x+4} 48, ${x} 44`;
                  return (
                    <g key={i} opacity={on && seatState!==0 ? 1 : 0.13}>
                      <path d={d} fill="none" stroke={seat.color} strokeWidth="5.5" strokeLinecap="round"
                        className={on && seatState!==0 ? cls : ""}/>
                      <path d={`M ${x} 41 l -6 8 m 6 -8 l 6 8`}
                        fill="none" stroke={seat.color} strokeWidth="5.5" strokeLinecap="round" strokeLinejoin="round"/>
                    </g>
                  );
                })}
              </svg>
            </div>

            <div style={{ flex: 1 }}>
              <div className="ttl" style={{ fontSize: 26, fontWeight: 700, color: seat.color, lineHeight: 1 }}>
                {seat.label}
              </div>
              <div className="mono" style={{ fontSize: 12, color: "#8aa3b8", marginTop: 6 }}>{seat.sub}</div>
              {/* level bars */}
              <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                {[1,2,3].map((lv) => (
                  <div key={lv} style={{
                    flex: 1, height: 8, borderRadius: 99,
                    background: seat.level >= lv ? seat.color : "rgba(255,255,255,0.1)",
                  }}/>
                ))}
              </div>
            </div>
          </div>
        </div>
        </div>{/* end seat column */}
        </div>{/* end top row grid */}

        {/* Touch sensor input — full width, serves both. Active only when fans ON. */}
        <button
          onMouseDown={triggerCover}
          onTouchStart={triggerCover}
          className="btn"
          style={{
            width: "100%", marginTop: 10,
            background: !fanOn ? "rgba(255,255,255,0.03)" : covered ? "#1b2c3a" : "rgba(255,255,255,0.06)",
            border: covered && fanOn ? "2px solid #ffd166" : "1px solid rgba(255,255,255,0.12)",
            color: !fanOn ? "#566b80" : covered ? "#ffd166" : "#cfe0ee", padding: "14px",
            opacity: !fanOn ? 0.6 : 1, cursor: fanOn ? "pointer" : "not-allowed",
            display: "flex", alignItems: "center", justifyContent: "center", gap: 10,
          }}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <circle cx="12" cy="12" r="4.5"/>
            <path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2" strokeLinecap="round"/>
          </svg>
          {!fanOn ? "TOUCH DISABLED — system on standby"
                  : covered ? "DETECTED — advancing seat speed…"
                  : "TOUCH SENSOR (cycle seat ventilation)"}
        </button>
        <div className="mono" style={{ fontSize: 10, color: "#5f7a93", textAlign: "center", marginTop: 6, marginBottom: 4 }}>
          {!fanOn ? "seat ventilation works only while the system is active (warm enough)"
                  : "LDR touch → 1s tap to seat controller · OFF → HIGH → MED → LOW → OFF"}
        </div>

        {/* Stat row (full width) */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 10, marginBottom: 10 }}>
          <div className="card" style={{ padding: 12 }}>
            <div className="mono" style={{ fontSize: 11, color: "#7fa8c9" }}>HUMIDITY</div>
            <div className="ttl" style={{ fontSize: 26, fontWeight: 700, marginTop: 2 }}>{Math.round(hum)}<span style={{ fontSize: 15, color: "#7fa8c9" }}>%</span></div>
            <div style={{ height: 6, borderRadius: 99, background: "rgba(255,255,255,0.1)", marginTop: 8, overflow: "hidden" }}>
              <div style={{ width: `${hum}%`, height: "100%", background: "linear-gradient(90deg,#4cc9f0,#4895ef)" }} />
            </div>
          </div>
          <div className="card" style={{ padding: 12, display: "flex", alignItems: "center", gap: 10 }}>
            <svg width="30" height="30" viewBox="0 0 24 24" className={fanOn ? "spin" : ""} fill={fanOn ? "#3ddc84" : "#5f7a93"}>
              <path d="M12 12c0-3 1-6 3-6s2 4 0 5c2-1 5 0 5 2s-3 2-5 1c2 1 3 4 1 5s-3-3-3-5c0 3-1 6-3 6s-2-4 0-5c-2 1-5 0-5-2s3-2 5-1c-2-1-3-4-1-5s3 3 3 5z"/>
              <circle cx="12" cy="12" r="2.2" fill="#0a1722"/>
            </svg>
            <div>
              <div className="mono" style={{ fontSize: 10, color: "#7fa8c9" }}>SYSTEM</div>
              <div className="ttl" style={{ fontSize: 20, fontWeight: 700, color: fanOn ? "#3ddc84" : "#8aa3b8" }}>{fanOn ? "ACTIVE" : "STANDBY"}</div>
            </div>
          </div>
        </div>

        {/* Trend sparkline (compact) */}
        <div className="card" style={{ padding: "8px 12px", marginBottom: 10, display: "flex", alignItems: "center", gap: 10 }}>
          <span className="mono" style={{ fontSize: 10, color: "#7fa8c9", flex: "0 0 auto" }}>TREND</span>
          <svg viewBox="0 0 400 40" style={{ width: "100%", height: 26 }} preserveAspectRatio="none">
            <polyline
              points={history.map((v, i) => `${(i / (history.length - 1)) * 400},${40 - ((v - minH) / span) * 32 - 4}`).join(" ")}
              fill="none" stroke={tempColor} strokeWidth="2.5" strokeLinejoin="round" />
          </svg>
        </div>

        {/* Controls: mode buttons + adjacent threshold sliders */}
        <div className="mono" style={{ fontSize: 11, color: "#7fa8c9", marginBottom: 8 }}>FAN MODE</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 10 }}>
          {[
            { k: "A", label: "AUTO", c: "#4895ef" },
            { k: "N", label: "FAN ON", c: "#3ddc84" },
            { k: "F", label: "FAN OFF", c: "#ff5e5b" },
          ].map((b) => (
            <button key={b.k} className="btn"
              onClick={() => applyMode(b.k)}
              style={{
                background: mode === b.k ? b.c : "rgba(255,255,255,0.06)",
                color: mode === b.k ? "#06121c" : "#cfe0ee",
                boxShadow: mode === b.k ? `0 6px 18px ${b.c}55` : "none",
                border: mode === b.k ? "none" : "1px solid rgba(255,255,255,0.1)",
              }}>
              {b.label}
            </button>
          ))}
        </div>

        {/* Threshold sliders — only relevant in AUTO mode */}
        <div className="card" style={{ padding: "12px 16px", marginBottom: 10, opacity: mode === "A" ? 1 : 0.4, transition: "opacity .2s ease" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
            <span className="mono" style={{ fontSize: 11, color: "#ff8a3d" }}>ON ABOVE</span>
            <span className="ttl" style={{ fontSize: 16, fontWeight: 700, color: "#ff5e5b" }}>{highT.toFixed(1)}°C</span>
          </div>
          <input type="range" min="20" max="32" step="0.5" value={highT}
            disabled={mode !== "A"}
            onChange={(e) => changeHigh(parseFloat(e.target.value))}
            style={{ width: "100%", accentColor: "#ff5e5b", cursor: mode === "A" ? "pointer" : "not-allowed" }} />
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "8px 0 4px" }}>
            <span className="mono" style={{ fontSize: 11, color: "#4cc9f0" }}>OFF BELOW</span>
            <span className="ttl" style={{ fontSize: 16, fontWeight: 700, color: "#4cc9f0" }}>{lowT.toFixed(1)}°C</span>
          </div>
          <input type="range" min="18" max="30" step="0.5" value={lowT}
            disabled={mode !== "A"}
            onChange={(e) => changeLow(parseFloat(e.target.value))}
            style={{ width: "100%", accentColor: "#4cc9f0", cursor: mode === "A" ? "pointer" : "not-allowed" }} />
          {mode !== "A" && (
            <div className="mono" style={{ fontSize: 9.5, color: "#5f7a93", textAlign: "center", marginTop: 8 }}>
              temperature limits apply in AUTO only
            </div>
          )}
        </div>

        <div className="mono" style={{ fontSize: 10, color: "#4f6b82", textAlign: "center", marginTop: 4 }}>
          Mode buttons send A / N / F · LDR cover fires the 1-second relay-2 tap
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<FanDashboard/>);
</script>
</body>
</html>
